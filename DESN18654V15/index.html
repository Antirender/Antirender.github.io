<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hand Surgery Quiz Portal</title>
  <link rel="icon" href="img/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome Icons -->
   <!-- from Font Awesome https://fontawesome.com -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
       /* 1) DARK/LIGHT MODE */
    :root {
      --bg: #ffffff;
      --fg: #333;
      --accent: #5078c6;
      --hl: #f0f4ff;
      --border: #ccc;
      --headingFont: "Kelly Slab", cursive;  /* h1–h5 */
      --bodyFont: "Ubuntu", sans-serif;      /* all else */
      transition: background-color 0.3s, color 0.3s;
    }

    @font-face {
      font-family: 'Kelly Slab';
      font-style: normal;
      font-weight: 400;
      src: url(https://fonts.gstatic.com/s/kellyslab/v17/-W_7XJX0Rz3cxUnJC5t6fkQLfr8nfiI.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    @font-face {
      font-family: 'Ubuntu';
      font-style: normal;
      font-weight: 400;
      src: url(https://fonts.gstatic.com/s/ubuntu/v20/4iCs6KVjbNBYlgoKfw72nU6AFw.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    body.dark {
      --bg: #1c1c1c;
      --fg: #ffffff;
      --accent: #6a9dfc;
      --hl: #333;
      --border: #555;
    }

       /* 2) GLOBAL RESETS */
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--bodyFont);
      transition: background-color 0.3s, color 0.3s;
    }
    h1, h2, h3, h4, h5 {
      font-family: var(--headingFont);
      margin-bottom: 0.5rem;
    }

       /* 3) HEADER */
    header {
      display: flex; 
      flex-direction: column;
      align-items: center;
      padding: 0.5rem;
      background: var(--hl);
      border-bottom: 1px solid var(--border);
    }
    #headerTop {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    #headerTop img {
      width: 32px; height: 32px;
    }
    #langSelect, #darkToggle, #resetBtn {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
    }
    #headerBottom {
      margin-top: 0.3rem;
    }

       /* 4) NAV TABS */
    #tabBar {
      display: flex;
      background: var(--accent);
      justify-content: center;
    }
    #tabBar li {
      list-style: none;
      padding: 0.5rem 1rem;
      color: #fff;
      cursor: pointer;
      border-right: 1px solid var(--hl);
    }
    #tabBar li:last-child {
      border-right: none;
    }
    #tabBar li.active {
      background: var(--hl);
      color: var(--fg);
    }

    /* For mobile,hide tabBar (use swipe) */
    @media (max-width: 600px) {
      #tabBar { display: none; }
    }

       /* 5) MAIN CONTENT / TABS */
    .tabPage {
      display: none;
      max-width: 600px;
      margin: 1rem auto;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--hl);
    }
    .tabPage.active {
      display: block;
    }

    .instructions {
      margin-bottom: 1rem;
      background: var(--bg);
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    /* Progress bar container */
    .progressWrap {
      background: var(--border);
      height: 10px;
      border-radius: 4px;
      margin: 0.5rem 0;
      overflow: hidden;
    }
    .progressBar {
      background: var(--accent);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

       /* 6) QUIZ LAYOUT */
    .quizItem {
      margin-bottom: 1rem;
      padding: 0.5rem;
      border: 1px dashed var(--border);
      border-radius: 4px;
      position: relative;
    }
    .quizItem h3 { margin-bottom: 0.5rem; }
    .quizOptions {
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .optionBtn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem;
      cursor: pointer;
      text-align: left;
    }
    .resultMsg {
      margin-top: 0.4rem;
      font-weight: bold;
    }
    /* Blur locked questions */
    .blurred {
      filter: blur(5px);
      pointer-events: none;
    }

       /* 7) ACHIEVEMENT */
    .achievementBox {
      display: none;
      margin-top: 1rem;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff0c1;
    }
    .achievementBox.active {
      display: block;
    }
    .achievementBox h4 {
      color: #d48a00;
    }

    /* Modal (pop-up) for finishing a module */
    .modalOverlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modalOverlay.active {
      display: flex;
    }
    .modalContent {
      background: var(--hl);
      color: var(--fg);
      padding: 1rem;
      border-radius: 6px;
      text-align: center;
      width: 80%;
      max-width: 400px;
      border: 2px solid var(--border);
    }
    .modalContent h2 {
      margin-bottom: 0.5rem;
    }
    .closeBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 0.5rem;
    }

       /* 8) FOOTER */
    footer {
      text-align: center;
      font-size: 0.9rem;
      padding: 0.5rem;
      color: var(--fg);
    }
  </style>
</head>

  <div id="headerTop">
    <img src="img/favicon.ico" alt="Logo Icon">

  <div id="headerBottom">

    <button id="resetBtn"><i class="fas fa-redo"></i> Reset</button>

  <li data-tab="tab2" data-i18n-tabName="mod2_title"></li>
  <li data-tab="tab3" data-i18n-tabName="mod3_title"></li>
  <li data-tab="tab4" data-i18n-tabName="mod4_title"></li>

<!-- MODULE 1 -->
<div id="tab1" class="tabPage active">

  <h2 data-i18n="mod1_header"></h2>
  <div class="progressWrap"><div class="progressBar" id="progress-tab1"></div></div>
  <div id="quizContainer-tab1"></div>
  <div class="achievementBox" id="achievement-tab1">

    <p data-i18n="achievement_mod1"></p>
  </div>
</div>

<!-- MODULE 2 -->
<div id="tab2" class="tabPage">

  <div class="progressWrap"><div class="progressBar" id="progress-tab2"></div></div>
  <div id="quizContainer-tab2"></div>
  <div class="achievementBox" id="achievement-tab2">

<!-- MODULE 3 -->
<div id="tab3" class="tabPage">

  <div id="quizContainer-tab3"></div>
  <div class="achievementBox" id="achievement-tab3">
    <h4 data-i18n="achievement_header"></h4>
    <p data-i18n="achievement_mod3"></p>
  </div>
</div>

<!-- MODULE 4 -->
<div id="tab4" class="tabPage">

  <div class="progressWrap"><div class="progressBar" id="progress-tab4"></div></div>

  <div class="achievementBox" id="achievement-tab4">
    <h4 data-i18n="achievement_header"></h4>
    <p data-i18n="achievement_mod4"></p>

</div>

<!-- MODAL for Achievement -->
<div class="modalOverlay" id="achievementModal">

    <h2 data-i18n="popup_congrats"></h2>
    <p id="popupMsg"></p>
    <button class="closeBtn" onclick="closeModal()">OK</button>
  </div>
</div>

<footer>
  <p>2025 &copy; <span data-i18n="footer_name"></span></p>
</footer>

/* this part track userAnswers, each module gets an array of length=10. 
   userAnswers[ tabX ][ i ]= correct/incorrect? local(week11 tutorial) store 'null' if not answered yet, or 'true' if correct. */
let userAnswers = {
  tab1: Array(10).fill(null),
  tab2: Array(10).fill(null),
  tab3: Array(10).fill(null),
  tab4: Array(10).fill(null),
};


//BUILD QUIZ UI
const modules=["tab1","tab2","tab3","tab4"];
modules.forEach(m => buildModule(m));

function buildModule(modName){
  const container = document.getElementById(`quizContainer-${modName}`);
  const qList = quizData[modName];
  // For each question, create a .quizItem
  //forgot where i learn this stuff
  qList.forEach((qObj, idx) => {
    const qDiv = document.createElement("div");
    qDiv.className="quizItem";
    qDiv.id=`${modName}_q${idx}`;

    // question text -> i18nData[lang][ qObj.key+"_q" ]
    // answer array -> i18nData[lang][ qObj.key+"_ops" ]
    qDiv.innerHTML=`
      <h3 id="${modName}_q${idx}_question"></h3>
      <div class="quizOptions" id="${modName}_q${idx}_options"></div>
      <div class="resultMsg" id="${modName}_q${idx}_result"></div>
    `;
    container.appendChild(qDiv);
  });
}

//LOGIC: answer, progress, localStorage, blur, etc.
function answerQuestion(modName, idx, chosenIndex){
  // If already correct, ignore further clicks
  //if no just try to find right answer
  if(userAnswers[modName][idx]===true) return;

  const correctIndex = quizData[modName][idx].correct;
  const resultMsg = document.getElementById(`${modName}_q${idx}_result`);

  if(chosenIndex===correctIndex){
    resultMsg.textContent="✔ Correct!";
    resultMsg.style.color="green";
    userAnswers[modName][idx] = true; 
    // Unblur next question
    //forgot where learn this code
    if(idx < 9) {
      document.getElementById(`${modName}_q${idx+1}`).classList.remove("blurred");
    }
  } else {
    resultMsg.textContent="✘ Wrong! Try again.";
    resultMsg.style.color="red";
  }
  saveAnswers();
  updateProgress(modName);
}

function saveAnswers(){
  localStorage.setItem("handSurgAnswers", JSON.stringify(userAnswers));
}

//Update progress bar AND check if module complete => show achievement & open modal
function updateProgress(modName){
  const arr = userAnswers[modName];
  const correctCount = arr.filter(v=>v===true).length;
  const bar = document.getElementById(`progress-${modName}`);
  if(bar) bar.style.width = (correctCount/10*100)+"%";

  // If all 10 correct => show achievement, show modal once
  if(correctCount===10){
    document.getElementById(`achievement-${modName}`).classList.add("active");
    // If user just completed now, show modal
    // We'll do a check if previously completed or not 
    // We'll do a small trick: if it wasn't done before, show pop up
    const wasComplete = localStorage.getItem(modName+"_completed");
    if(!wasComplete){
      localStorage.setItem(modName+"_completed","yes");
      document.getElementById("popupMsg").textContent = i18nData[currentLang][`achievement_${modName}`] || "Completed!";
      openModal();
    }
  }
}

//LOAD: restore userAnswers from localStorage

window.addEventListener("load", ()=>{
  const saved = localStorage.getItem("handSurgAnswers");
  if(saved){
    userAnswers= JSON.parse(saved);
  }
  // Render UI
  modules.forEach(m => {
    const qArr = quizData[m];
    qArr.forEach((qObj, idx)=>{
      renderQuestion(m, idx, qObj);
    });
    // Apply blur logic
    applyBlurLogic(m);
    updateProgress(m);
  });

  // Initialize language
  const storedLang = localStorage.getItem("handSurgLang") || "en";
  loadLanguageList();
  translateUI(storedLang);

  // Dark mode setting
  if(!localStorage.getItem("handSurgMode")) localStorage.setItem("handSurgMode","light");
  if(localStorage.getItem("handSurgMode")==="dark"){
    document.body.classList.add("dark");
    darkToggle.textContent = "Light";
  } else {
    darkToggle.textContent = "Dark";
  }
});

// Apply or remove blur from questions except the first. 
 //  Each question remains blurred until the previous is answered correct.
     //forgot where learn this code
function applyBlurLogic(modName){
  const arr = userAnswers[modName];
  arr.forEach((val, idx)=>{
    const qDiv = document.getElementById(`${modName}_q${idx}`);
    if(idx===0){
      // First question never blurred
      qDiv.classList.remove("blurred");
    } else {
      if(arr[idx-1]===true) qDiv.classList.remove("blurred");
      else qDiv.classList.add("blurred");
    }
  });
}

/* Render the question text, answers, hooking up onClick etc. */
function renderQuestion(modName, idx, qObj){
  const qDiv = document.getElementById(`${modName}_q${idx}_question`);
  const opsDiv= document.getElementById(`${modName}_q${idx}_options`);
  if(!qDiv||!opsDiv) return;

  // Fill text from i18n
  qDiv.textContent = ""; // done in translateUI
  opsDiv.innerHTML="";
  for(let i=0;i<4;i++){
    const btn=document.createElement("button");
    btn.className="optionBtn";
    btn.onclick=()=>answerQuestion(modName, idx, i);
    opsDiv.appendChild(btn);
  }
}

//LANGUAGE / i18n
//learn this from w3school i think?
let currentLang="en"; 
function loadLanguageList(){
  const sel=document.getElementById("langSelect");
  sel.innerHTML="";
  const languages = ["en","fr","zh","jp"];
  const labels = {"en":"English","fr":"Français","zh":"简体中文","jp":"日本語"};
  languages.forEach(l=>{
    const opt=document.createElement("option");
    opt.value=l; opt.textContent=labels[l];
    sel.appendChild(opt);
  });
  sel.onchange=()=>{
    const val=sel.value;
    localStorage.setItem("handSurgLang", val);
    translateUI(val);
  };
}

/* Translate all dynamic text from i18nData for the current language. */
function translateUI(lang){
  currentLang=lang;
  const dict=i18nData[lang] || i18nData.en;

  // 1) Translate main UI
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key=el.getAttribute("data-i18n");
    el.textContent = dict[key]||key;
  });
  // 2) Translate tab titles
  document.querySelectorAll("[data-i18n-tabName]").forEach(el=>{
    const key=el.getAttribute("data-i18n-tabName");
    el.textContent = dict[key]||key;
  });
  // 3) Translate each quiz question/option
  modules.forEach(m=>{
    quizData[m].forEach((qObj, idx)=>{
      const qKey = qObj.key+"_q";
      const opsKey= qObj.key+"_ops";
      const questionEl = document.getElementById(`${m}_q${idx}_question`);
      const opsEl = document.getElementById(`${m}_q${idx}_options`);
      if(!questionEl||!opsEl) return;
      questionEl.textContent= dict[qKey] || "";
      const arr= dict[opsKey] || [];
      // Update 4 button texts
      const allBtns = opsEl.querySelectorAll(".optionBtn");
      allBtns.forEach((b,i)=>{
        b.textContent= arr[i] || "";
      });
      // If the user already answered => update result text
      const resultMsg = document.getElementById(`${m}_q${idx}_result`);
      if(userAnswers[m][idx]===true){
        resultMsg.textContent="✔ Correct!";
        resultMsg.style.color="green";
      } else if(userAnswers[m][idx]===false){
        resultMsg.textContent="✘ Wrong! Try again.";
        resultMsg.style.color="red";
      } else {
        resultMsg.textContent="";
      }
    });
  });

  // Update any existing "achievement" message if the user completed
  //learn this from w3school I think?
  modules.forEach(m=>{
    const arr=userAnswers[m];
    const correctCount= arr.filter(v=>v===true).length;
    if(correctCount===10){
      document.getElementById(`achievement-${m}`).classList.add("active");
    }
  });
  // If any pop-up is open, update text
}

// HAND GESTURE TABS & SWIPE
  //learn this from DESN18654 I think?
const tabEls = document.querySelectorAll("#tabBar li");
tabEls.forEach(t=>{
  t.onclick=()=> setActiveTab(t.dataset.tab);
});
function setActiveTab(tabId){
  tabEls.forEach(t=>t.classList.remove("active"));
  document.querySelector(`[data-tab='${tabId}']`).classList.add("active");
  document.querySelectorAll(".tabPage").forEach(pg=>pg.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
}
/* Mobile swipe */
const hammertime = new Hammer(document.body);
hammertime.on('swipeleft', ()=>{
  const activeOne = document.querySelector("#tabBar li.active");
  if(!activeOne) return;
  const all = [...tabEls];
  let idx = all.indexOf(activeOne);
  if(idx<all.length-1){ idx++; setActiveTab(all[idx].dataset.tab); }
});
hammertime.on('swiperight', ()=>{
  const activeOne = document.querySelector("#tabBar li.active");
  if(!activeOne) return;
  const all = [...tabEls];
  let idx = all.indexOf(activeOne);
  if(idx>0){ idx--; setActiveTab(all[idx].dataset.tab); }
});

// DARK MODE
const darkToggle = document.getElementById("darkToggle");
darkToggle.onclick=()=>{
  document.body.classList.toggle("dark");
  if(document.body.classList.contains("dark")){
    localStorage.setItem("handSurgMode","dark");
    darkToggle.textContent="Light";
  } else {
    localStorage.setItem("handSurgMode","light");
    darkToggle.textContent="Dark";
  }
};

//RESET
const resetBtn=document.getElementById("resetBtn");
resetBtn.onclick=()=>{
  if(confirm("Reset all progress?")){
    localStorage.clear();
    location.reload();
  }
};
