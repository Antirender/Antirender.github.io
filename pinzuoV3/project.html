<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品详情 — 品作设计 Pinzuo Design</title>
  <meta name="description" content="品作设计作品详情">
  <link rel="icon" href="assets/static/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav page-nav scrolled" id="nav">
    <div class="nav-inner">
      <a href="index.html#hero" class="nav-logo">
        <img src="assets/static/logo.jpg" alt="品作设计 Logo">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#about" data-i18n="nav.about">关于我们</a></li>
        <li><a href="index.html#services" data-i18n="nav.services">服务范围</a></li>
        <li><a href="index.html#portfolio" data-i18n="nav.portfolio">作品集</a></li>
        <li><a href="index.html#contact" data-i18n="nav.contact">联系我们</a></li>
        <li><a href="webdisk.html" data-i18n="nav.webdisk">网盘后端</a></li>
      </ul>
      <div class="nav-controls" id="navControls">
        <button class="lang-toggle" id="langToggle" aria-label="Switch Language">EN</button>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">☾</button>
      </div>
    </div>
  </nav>

  <!-- Project Hero -->
  <section class="project-hero" id="projectHero">
    <div class="project-hero-bg">
      <img src="" alt="" id="heroImg">
    </div>
    <div class="project-hero-overlay"></div>
    <div class="project-hero-content">
      <div class="project-cat" id="projectCat"></div>
      <h1 id="projectName"></h1>
      <div class="project-en" id="projectEn"></div>
      <div class="project-year" id="projectYear"></div>
    </div>
  </section>

  <!-- Back link -->
  <a href="index.html#portfolio" class="back-link" data-i18n="pj.back">&larr; 返回作品集</a>

  <!-- Project Body -->
  <div class="project-body">
    <p class="project-desc" id="projectDesc"></p>
    <div class="project-gallery" id="projectGallery"></div>
  </div>

  <!-- Project Navigation (prev / next) -->
  <div class="project-nav" id="projectNav"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-col">
        <img src="assets/static/logo2.jpg" alt="品作设计" class="footer-logo">
        <p class="footer-tagline" data-i18n="ft2.tag">设计与研究并重<br>艺术品质的人文环境</p>
      </div>
      <div class="footer-col">
        <h4 data-i18n="ft2.ct">联系方式</h4>
        <p data-i18n="ft2.phone">电话：025-86220928</p>
        <p data-i18n="ft2.email">邮箱：pinzuodesign@163.com</p>
        <p data-i18n="ft2.addr">地址：南京市鼓楼区北京西路 72 号 16 楼</p>
      </div>
      <div class="footer-col">
        <h4 data-i18n="ft2.links">链接</h4>
        <a href="index.html#portfolio" data-i18n="ft2.port">作品集</a>
        <a href="webdisk.html" data-i18n="ft2.wd">网盘</a>
      </div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose" aria-label="关闭">&times;</button>
    <button class="lb-prev" id="lbPrev" aria-label="上一张">&#10094;</button>
    <button class="lb-next" id="lbNext" aria-label="下一张">&#10095;</button>
    <div class="lb-content">
      <img src="" alt="" id="lbImg">
      <div class="lb-caption" id="lbCaption"></div>
      <div class="lb-counter" id="lbCounter"></div>
    </div>
  </div>

  <!-- Load main.js first (project data + lightbox) then project page script -->
  <script src="js/main.js"></script>
  <script>
  (function () {
    'use strict';

    var projects = window.__PINZUO_PROJECTS;
    var catLabels = window.__PINZUO_CAT_LABELS;
    var catEn = window.__PINZUO_CAT_EN || {};
    var descEn = window.__PINZUO_DESC_EN || {};
    var pz = window.__pinzuo || {};
    if (!projects) return;

    // Parse slug from URL
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    if (!slug) { window.location.href = 'index.html#portfolio'; return; }

    // Find project
    var projIdx = -1;
    var proj = null;
    for (var i = 0; i < projects.length; i++) {
      if (projects[i].slug === slug) { proj = projects[i]; projIdx = i; break; }
    }
    if (!proj) { window.location.href = 'index.html#portfolio'; return; }

    function renderProjectPage() {
      var lang = pz.getLang ? pz.getLang() : 'zh';
      var isEn = lang === 'en';
      var displayName = isEn ? proj.en : proj.name;
      var catLabel = isEn ? (catEn[proj.cat] || proj.cat) : (catLabels[proj.cat] || proj.cat);
      var desc = isEn ? (descEn[proj.slug] || proj.desc) : proj.desc;

      // Update page title
      document.title = displayName + ' \u2014 ' + (isEn ? 'Pinzuo Design' : '\u54c1\u4f5c\u8bbe\u8ba1 Pinzuo Design');

      // Fill hero
      document.getElementById('heroImg').src = proj.cover;
      document.getElementById('heroImg').alt = displayName;
      document.getElementById('projectCat').textContent = catLabel.toUpperCase();
      document.getElementById('projectName').textContent = displayName;
      document.getElementById('projectEn').textContent = isEn ? proj.name : proj.en;
      document.getElementById('projectYear').textContent = proj.year;

      // Description
      document.getElementById('projectDesc').textContent = desc;

      // Prev / Next navigation
      var navEl = document.getElementById('projectNav');
      var prevProj = projIdx > 0 ? projects[projIdx - 1] : null;
      var nextProj = projIdx < projects.length - 1 ? projects[projIdx + 1] : null;
      var allLabel = isEn ? 'All Works' : '\u5168\u90e8\u4f5c\u54c1';
      var html = '';
      if (prevProj) {
        var pName = isEn ? prevProj.en : prevProj.name;
        html += '<a href="project.html?slug=' + prevProj.slug + '">&larr; ' + pName + '</a>';
      } else {
        html += '<span></span>';
      }
      html += '<a href="index.html#portfolio" style="font-size:.75rem;letter-spacing:.2em;text-transform:uppercase">' + allLabel + '</a>';
      if (nextProj) {
        var nName = isEn ? nextProj.en : nextProj.name;
        html += '<a href="project.html?slug=' + nextProj.slug + '">' + nName + ' &rarr;</a>';
      } else {
        html += '<span></span>';
      }
      navEl.innerHTML = html;
    }

    // Gallery (only build once)
    var gallery = document.getElementById('projectGallery');
    var allImages = [proj.cover].concat(proj.images);
    allImages.forEach(function (src, idx) {
      var img = document.createElement('img');
      img.src = src;
      img.alt = proj.name + ' \u00b7 ' + (idx + 1);
      img.loading = 'lazy';
      img.addEventListener('click', function () {
        if (window.openLightbox) {
          window.openLightbox(allImages, idx, proj.name + ' \u2014 ' + proj.en);
        }
      });
      gallery.appendChild(img);
    });

    // Initial render
    renderProjectPage();

    // Listen for language changes
    window.addEventListener('langchange', renderProjectPage);
    // Hook into __rerender for language switches
    var origRerender = window.__rerender || function () {};
    window.__rerender = function () {
      origRerender();
      renderProjectPage();
    };

    // Mobile nav toggle
    var navToggle = document.getElementById('navToggle');
    var navLinksEl = document.getElementById('navLinks');
    if (navToggle && navLinksEl) {
      navToggle.addEventListener('click', function () {
        navLinksEl.classList.toggle('open');
      });
      navLinksEl.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') navLinksEl.classList.remove('open');
      });
    }
  })();
  </script>
</body>
</html>
